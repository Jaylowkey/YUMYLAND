version: "3.8"

services:
  db:
    image: postgres:16-alpine
    container_name: yumyland-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: yumyland
      POSTGRES_PASSWORD: yumyland_secret
      POSTGRES_DB: yumyland
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
